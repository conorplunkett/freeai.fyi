name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  chrome-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chrome-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint (syntax)
        run: npm run lint
      - name: Test (headless DOM harness)
        run: npm test

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: freeai
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/freeai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - name: End-to-end tests (real Postgres, fake Stripe)
        run: npm test

  desktop-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  desktop-macos:
    runs-on: macos-14
    defaults:
      run:
        working-directory: desktop/macos/SponsorOverlay
    steps:
      - uses: actions/checkout@v4
      - name: Build (debug + release)
        run: |
          swift build
          swift build -c release
      - name: Package .app (ad-hoc signed)
        run: BUILD_NUMBER="${{ github.run_number }}" ./packaging/bundle.sh
      - uses: actions/upload-artifact@v4
        with:
          name: SponsorOverlay-macos
          path: desktop/macos/SponsorOverlay/build/SponsorOverlay.zip

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check site JS
        run: node -c script.js
