name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check
        run: node -c extension.js
      - name: Test (mock-vscode harness)
        run: npm test
      - name: Package .vsix
        run: npx --yes @vscode/vsce package --no-dependencies -o betterbacks-ai.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: betterbacks-vsix
          path: extension/betterbacks-ai.vsix

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: betterbacks
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/betterbacks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - name: End-to-end tests (real Postgres, fake Stripe)
        run: npm test

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check site JS
        run: node -c script.js
