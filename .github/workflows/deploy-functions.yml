name: Deploy Edge Functions

# Deploys the Supabase Edge Function(s) that make up the API. Runs after a merge
# to main that touches supabase/functions/** (and on demand). This is the
# production deploy that replaced `fly deploy`.
#
# Requires two repo secrets:
#   SUPABASE_ACCESS_TOKEN  — a personal access token (Supabase dashboard → Account → Access Tokens)
#   SUPABASE_PROJECT_REF   — the project ref (defaults below to the FreeAI project)
on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'wpjfhezklpczxzocgxsb' }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Check access token is configured
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set — add it in repo Settings → Secrets to enable deploys."
            exit 1
          fi
      - name: Deploy api
        run: supabase functions deploy api --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
