# FreeAI API — Fly.io deploy config.
# Usage:
#   fly launch --no-deploy            # create the app
#   fly secrets set DATABASE_URL=... STRIPE_SECRET_KEY=... STRIPE_WEBHOOK_SECRET=... \
#       ADMIN_KEY=... SITE_URL=https://freeai.fyi API_BASE_URL=https://api.freeai.fyi
#   fly deploy

app = "freeai-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
